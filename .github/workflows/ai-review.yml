name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  ai-review:
    name: AI Code Review (Local LLM)
    runs-on: [self-hosted, ai-review]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Queue AI Review
        run: |
          curl -sf -X POST http://127.0.0.1:8000/webhook \
            -H "Content-Type: application/json" \
            -d "{\"pr_number\": ${{ github.event.pull_request.number }}, \"repo\": \"${{ github.repository }}\", \"secret\": \"${{ secrets.WEBHOOK_SECRET }}\"}"
